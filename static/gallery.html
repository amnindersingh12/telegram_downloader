<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TGrab Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=7">
</head>

<body class="gal-page">

  <header>
    <button class="h-back" onclick="history.back()">← Back</button>
    <div class="h-logo">📡 TGrab <span class="h-sub">Gallery</span></div>
    <div class="h-ct" id="hct">Loading…</div>
    <div style="display:flex;gap:8px;align-items:center">
      <!-- Mode toggle -->
      <button class="h-mode" onclick="toggleMode()">☀ / ☾</button>
    </div>
  </header>

  <div class="grid" id="grid"></div>
  <div id="load-more-container" style="display:flex;justify-content:center;padding:20px 0 60px">
    <button id="load-more" class="btn btn-g" style="width:200px;display:none" onclick="loadMore()">Load More</button>
  </div>

  <!-- Lightbox -->
  <div class="lb" id="lb" onclick="onBg(event)">
    <button class="lb-close" onclick="closeLb()">✕</button>
    <button class="lb-nav lb-prev" onclick="nav(-1,event)">‹</button>
    <button class="lb-nav lb-next" onclick="nav(1,event)">›</button>
    <div class="lb-cnt" id="lbcnt"></div>
    <div class="lb-wrap">
      <div class="lb-box" id="lbbox"></div>
      <div class="lb-cap" id="lbcap"></div>
    </div>
  </div>

  <div id="toasts"></div>
  <script src="/static/common.js?v=1"></script>
  <script src="/static/gallery.js?v=2" defer></script>
</body>

</html>
